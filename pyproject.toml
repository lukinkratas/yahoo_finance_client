[project]
name = "yfas"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "asyncio>=4.0.0",
    "curl-cffi>=0.13.0",
    "logging>=0.4.9.6",
]

[project.optional-dependencies]
dev = [
    "poethepoet>=0.37.0",
    "ruff>=0.12.12",
    "mypy>=1.17.1",
]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.ruff]
line-length = 88
indent-width = 4

[tool.ruff.lint]
extend-select = ["E501", "N", "R", "I", "C901", "PD", "NPY", "D"]
ignore = ["D100", "D104", "D107"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
strict = true
explicit_package_bases = true
check_untyped_defs = true
disallow_untyped_calls = false
disable_error_code = ["no-any-return"]

[tool.poe.tasks.lint]
help = "Lint the code using ruff"
cmd = "uv run --dev ruff check --fix"

[tool.poe.tasks.format]
help = "Format the code using ruff"
cmd  = "uv run --dev ruff format"

[tool.poe.tasks.typecheck]
help = "Type check the code using mypy"
cmd  = "uv run --dev mypy ."

[tool.poe.tasks.test]
help = "Run tests"
cmd  = "uv run --dev pytest"
